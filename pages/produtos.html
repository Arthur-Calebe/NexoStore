<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXO Store — Galeria de produtos. Navegue por nossa seleção completa de itens tech e lifestyle." />
  <title>NEXO Store — Produtos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Navegação principal">
    <div class="nav__inner">
      <a href="../index.html" class="nav__logo" aria-label="NEXO Store — Página inicial">
        <div class="nav__logo-icon" aria-hidden="true"><i class="ph-fill ph-lightning"></i></div>
        NEXO<span>Store</span>
      </a>

      <ul class="nav__links" role="list">
        <li><a href="../index.html" class="nav__link">Início</a></li>
        <li><a href="produtos.html" class="nav__link" aria-current="page">Produtos</a></li>
        <li><a href="carrinho.html" class="nav__link">Carrinho</a></li>
      </ul>

      <a href="carrinho.html" class="nav__cart-btn" aria-label="Carrinho de compras">
        <i class="ph ph-shopping-cart-simple"></i>
        <span class="nav__cart-badge" aria-live="polite" aria-label="Itens no carrinho"></span>
      </a>
      <button class="nav__hamburger" aria-label="Abrir menu" aria-expanded="false" aria-controls="navLinks">
          <i class="ph ph-list"></i>
        </button>
    </div>
  </nav>

  <main class="page">
    <div class="products-page">

      <header class="products-page__header">
        <h1 class="products-page__title">Galeria de Produtos</h1>
        <p class="products-page__subtitle">Descubra nossa coleção completa — filtre por categoria ou busque o que procura.</p>
      </header>

      <search role="search">
        <label for="searchInput" class="sr-only">Buscar produtos</label>
        <div class="search-bar">
          <i class="ph ph-magnifying-glass search-bar__icon" aria-hidden="true"></i>
          <input type="search" id="searchInput" class="search-bar__input" placeholder="Buscar produto por nome ou descrição…" autocomplete="off" spellcheck="false" />
        </div>
      </search>

      <div id="categoryFilters" class="category-filters" role="group" aria-label="Filtrar por categoria"></div>

      <div id="spinnerWrap" class="spinner-wrap" role="status" aria-live="polite" aria-label="Carregando produtos">
        <div class="spinner" aria-hidden="true"></div>
        <p>Carregando produtos…</p>
      </div>

      <section id="productsGrid" class="products-grid hidden" aria-label="Galeria de produtos" aria-live="polite"></section>

    </div>
  </main>

  <footer>
    <div class="footer__inner">
      <div class="footer__logo">
        <div class="footer__logo-icon" aria-hidden="true"><i class="ph-fill ph-lightning"></i></div>
        NEXO Store
      </div>
      <nav aria-label="Redes sociais">
        <ul class="footer__social" role="list">
          <li><a href="https://instagram.com" class="footer__social-link" target="_blank" rel="noopener noreferrer"><i class="ph ph-instagram-logo"></i></a></li>
          <li><a href="https://twitter.com" class="footer__social-link" target="_blank" rel="noopener noreferrer"><i class="ph ph-x-logo"></i></a></li>
          <li><a href="https://tiktok.com" class="footer__social-link" target="_blank" rel="noopener noreferrer"><i class="ph ph-tiktok-logo"></i></a></li>
        </ul>
      </nav>
      <p class="footer__copy">© 2026 NEXO Store. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
